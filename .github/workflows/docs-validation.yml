name: Documentation Validation

on:
  pull_request:
    paths:
      - 'docs/**'
  push:
    branches:
      - main
    paths:
      - 'docs/**'

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    name: Validate Documentation Rules
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Validate docs structure
        run: |
          chmod +x scripts/docs/validate-docs.sh
          ./scripts/docs/validate-docs.sh
      
      # Link-Check temporär deaktiviert - zu viele false positives
      # Prüft auch nicht-docs Dateien (.Roo, plans) was nicht gewünscht ist
