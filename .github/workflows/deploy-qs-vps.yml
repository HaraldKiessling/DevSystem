name: Deploy QS-VPS

on:
  workflow_dispatch:
    inputs:
      deployment_mode:
        description: 'Deployment Mode'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal
          - force
          - dry-run
          - rollback
      component:
        description: 'Specific component (leave empty for all)'
        required: false
        type: string

  push:
    branches:
      - main
    paths:
      - 'scripts/qs/**'
      - '.github/workflows/deploy-qs-vps.yml'

jobs:
  deploy:
    name: Deploy to QS-VPS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Tailscale (OAuth)
        id: tailscale_oauth
        if: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID != '' }}
        continue-on-error: true
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
      
      - name: Setup Tailscale (Auth Key Fallback)
        id: tailscale_authkey
        if: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID == '' && steps.tailscale_oauth.outcome != 'success' }}
        continue-on-error: true
        uses: tailscale/github-action@v2
        with:
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
      
      - name: Tailscale Status
        if: steps.tailscale_oauth.outcome == 'failure' && steps.tailscale_authkey.outcome == 'failure'
        run: |
          echo "⚠️ Tailscale setup failed - VPS not reachable" >> $GITHUB_STEP_SUMMARY
          echo "::error::Tailscale authentication failed. Deploy cannot continue without Tailscale."
          echo ""
          echo "## 🔧 Lösung: Tailscale OAuth einrichten (einmalig, permanent)"
          echo ""
          echo "Führe aus: ./scripts/setup-tailscale-github-auth.sh"
          echo "Wähle Option 2 für OAuth (permanent, keine Erneuerung nötig)"
          echo ""
          echo "Siehe: docs/operations/TAILSCALE-GITHUB-SETUP-SIMPLIFIED.md"
          exit 1

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.QS_VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.QS_VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH Connection
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.QS_VPS_USER }}@${{ secrets.QS_VPS_HOST }} \
            "echo 'SSH connection successful'"

      - name: Sync Repository to QS-VPS
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='*.log' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            ./ \
            ${{ secrets.QS_VPS_USER }}@${{ secrets.QS_VPS_HOST }}:/root/work/DevSystem/

      - name: Run Master-Orchestrator
        run: |
          # Build command based on inputs
          DEPLOY_CMD="cd /root/work/DevSystem && sudo bash scripts/qs/setup-qs-master.sh"
          
          # Add deployment mode
          MODE="${{ github.event.inputs.deployment_mode || 'normal' }}"
          if [ "$MODE" = "force" ]; then
            DEPLOY_CMD="$DEPLOY_CMD --force"
          elif [ "$MODE" = "dry-run" ]; then
            DEPLOY_CMD="$DEPLOY_CMD --dry-run"
          elif [ "$MODE" = "rollback" ]; then
            DEPLOY_CMD="$DEPLOY_CMD --rollback"
          fi
          
          # Add specific component if provided
          if [ -n "${{ github.event.inputs.component }}" ]; then
            DEPLOY_CMD="$DEPLOY_CMD --component=${{ github.event.inputs.component }}"
          fi
          
          echo "Executing: $DEPLOY_CMD"
          
          # Execute deployment
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.QS_VPS_USER }}@${{ secrets.QS_VPS_HOST }} \
            "$DEPLOY_CMD"

      - name: Fetch Deployment Report
        if: always()
        run: |
          # Get latest report
          REPORT=$(ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.QS_VPS_USER }}@${{ secrets.QS_VPS_HOST }} \
            "ls -t /var/log/qs-deployment/deployment-report-*.md 2>/dev/null | head -n1" || echo "")
          
          if [ -n "$REPORT" ]; then
            echo "### Deployment Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
              ${{ secrets.QS_VPS_USER }}@${{ secrets.QS_VPS_HOST }} \
              "cat $REPORT" >> $GITHUB_STEP_SUMMARY || echo "Report not available"
          fi

      - name: Validate Services
        if: success()
        run: |
          echo "### Service Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check service status
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.QS_VPS_USER }}@${{ secrets.QS_VPS_HOST }} \
            "systemctl is-active caddy qdrant-qs" > /tmp/services.txt || true
          
          CADDY_STATUS=$(sed -n '1p' /tmp/services.txt)
          QDRANT_STATUS=$(sed -n '2p' /tmp/services.txt)
          
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Caddy | $CADDY_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Qdrant | $QDRANT_STATUS |" >> $GITHUB_STEP_SUMMARY
          
          # Check if services are active
          if [ "$CADDY_STATUS" != "active" ] || [ "$QDRANT_STATUS" != "active" ]; then
            echo "::error::One or more services are not active"
            exit 1
          fi

      - name: Run Health Checks
        if: success()
        run: |
          echo "### Health Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Qdrant health check
          QDRANT_HEALTH=$(ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.QS_VPS_USER }}@${{ secrets.QS_VPS_HOST }} \
            "curl -s http://localhost:6333/healthz" || echo "failed")
          
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Qdrant API | $QDRANT_HEALTH |" >> $GITHUB_STEP_SUMMARY
          
          if [ "$QDRANT_HEALTH" != "healthz check passed" ]; then
            echo "::warning::Qdrant health check failed"
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/id_ed25519
